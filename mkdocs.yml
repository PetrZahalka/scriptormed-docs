site_name: ScriptorMed Dokumentace
site_url: https://docs.scriptormed.com
site_description: Uživatelská dokumentace pro ScriptorMed — AI-asistovaná klinická dokumentace
site_author: Temvara Systems s.r.o.

repo_url: https://github.com/temvara/scriptormed-docs
repo_name: scriptormed-docs

copyright: "&copy; 2026 Temvara Systems s.r.o."

theme:
  name: material
  language: cs
  custom_dir: overrides
  logo: assets/images/logo_dark.png
  favicon: assets/images/favicon.png

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Přepnout na tmavý režim

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Přepnout na světlý režim

  font:
    text: Plus Jakarta Sans
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.tooltips

  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/css/temvara.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://www.scriptormed.com
      name: ScriptorMed Web
    - icon: fontawesome/solid/envelope
      link: mailto:podpora@scriptormed.com
      name: Podpora

  generator: false

  # Analytics (doplnit až bude GA/Plausible)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

plugins:
  - search:
      lang: cs
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Na této stránce
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic

nav:
  - Úvod: index.md
  - Desktop:
    - Přehled: desktop/index.md
    - Instalace: desktop/instalace.md
    - První spuštění: desktop/prvni-spusteni.md
    - Nahrávání konzultace: desktop/nahravani.md
    - Klinická zpráva: desktop/klinicka-zprava.md
    - Nastavení: desktop/nastaveni.md
    - Aktualizace: desktop/aktualizace.md
  - Portál:
    - Přehled: portal/index.md
    - Registrace: portal/registrace.md
    - Předplatné a fakturace: portal/predplatne.md
    - Licenční klíče: portal/licencni-klice.md
  - Řešení problémů: faq.md
  - Kontakt: kontakt.md
